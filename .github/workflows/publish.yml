name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'
      - 'core-v*'
      - 'http-v*'
      - 'sockets-v*'
      - 'websockets-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ./FIO.slnx

      - name: Build Release
        run: dotnet build -c Release --no-restore ./FIO.slnx

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal ./FIO.slnx

      - name: Resolve release target
        id: release
        run: |
          ref="${GITHUB_REF_NAME}"
          props_version="$(grep -oE '<Version>[^<]+</Version>' Directory.Build.props | head -1 | sed -E 's#</?Version>##g')"
          mode=""; version=""; projects=""; pack_arg=""
          case "$ref" in
            core-v*)       version="${ref#core-v}";       mode="core";      projects="src/FIO/FIO.fsproj";                       pack_arg="-p:Version=${version}" ;;
            http-v*)       version="${ref#http-v}";       mode="extension"; projects="src/FIO.Http/FIO.Http.fsproj";             pack_arg="-p:PackageReleaseVersion=${version}" ;;
            sockets-v*)    version="${ref#sockets-v}";    mode="extension"; projects="src/FIO.Sockets/FIO.Sockets.fsproj";       pack_arg="-p:PackageReleaseVersion=${version}" ;;
            websockets-v*) version="${ref#websockets-v}"; mode="extension"; projects="src/FIO.WebSockets/FIO.WebSockets.fsproj"; pack_arg="-p:PackageReleaseVersion=${version}" ;;
            v*)            version="${ref#v}";            mode="lockstep";  projects="src/FIO/FIO.fsproj src/FIO.Sockets/FIO.Sockets.fsproj src/FIO.WebSockets/FIO.WebSockets.fsproj src/FIO.Http/FIO.Http.fsproj"; pack_arg="-p:Version=${version}" ;;
            *)             mode="manual";   projects="src/FIO/FIO.fsproj src/FIO.Sockets/FIO.Sockets.fsproj src/FIO.WebSockets/FIO.WebSockets.fsproj src/FIO.Http/FIO.Http.fsproj"; pack_arg="" ;;
          esac

          if [[ -n "$version" && ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$version' parsed from tag '$ref'."
            exit 1
          fi

          # Lockstep and core releases define the core baseline that extensions
          # depend on, so the tag must match Directory.Build.props <Version>.
          if [[ "$mode" == "lockstep" || "$mode" == "core" ]]; then
            if [[ "$version" != "$props_version" ]]; then
              echo "::error::Tag version '$version' does not match Directory.Build.props <Version> '$props_version'. Bump the baseline version to match the tag before a core/lockstep release."
              exit 1
            fi
          fi

          {
            echo "mode=$mode"
            echo "projects=$projects"
            echo "pack_arg=$pack_arg"
          } >> "$GITHUB_OUTPUT"
          echo "Release mode: ${mode} | version: ${version:-<props default>} | projects: ${projects}"

      - name: Pack NuGet packages
        env:
          PROJECTS: ${{ steps.release.outputs.projects }}
          PACK_ARG: ${{ steps.release.outputs.pack_arg }}
        run: |
          for proj in $PROJECTS; do
            dotnet pack "$proj" -c Release $PACK_ARG -o ./nupkgs
          done

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkgs/*.nupkg

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
